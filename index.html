<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>贵金属价格监控</title>
<style>
*{box-sizing:border-box;font-family:Microsoft YaHei,sans-serif;margin:0;padding:0}
body{background:#f7f9fc;color:#333}
.header{background:#1d4ed8;color:#fff;padding:1rem 2rem;}
.toolbar{display:flex;gap:10px;padding:1rem 2rem;background:#fff;flex-wrap:wrap}
.toolbar input{padding:8px;border:1px solid #ddd;border-radius:6px}
.toolbar button{padding:8px 14px;background:#1d4ed8;color:#fff;border:none;border-radius:6px;cursor:pointer}
.tabbar{display:flex;background:#fff;}
.tab{padding:1rem 1.5rem;cursor:pointer;font-weight:500}
.tab.active{border-bottom:3px solid #1d4ed8;color:#1d4ed8}
.page{display:none;padding:1.5rem 2rem}
.page.active{display:block}
.card{background:#fff;border-radius:10px;padding:1rem;margin:1rem 0;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.chart-box{height:280px;width:100%}
.table-box{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th,td{padding:10px;text-align:left;border-bottom:1px solid #eee}
th{background:#eff6ff;color:#1e40af}
.kpi{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1rem}
.kpi .item{background:#fff;padding:1rem;border-radius:10px;text-align:center;box-shadow:0 2px 6px rgba(0,0,0,0.05)}
.kpi .label{font-size:12px;color:#666}
.kpi .value{font-size:16px;font-weight:bold;margin-top:4px}

/* 登录遮罩 */
.mask{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:9999}
.login{background:#fff;padding:30px;border-radius:16px;width:340px}
.login h3{margin-bottom:20px;text-align:center}
.login input{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;margin-bottom:16px}
.login button{width:100%;padding:12px;background:#1d4ed8;color:#fff;border:none;border-radius:8px;cursor:pointer}

.pwdModal{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:999}
.pwdBox{background:#fff;padding:24px;border-radius:12px;width:320px}
.pwdBox input{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;margin:12px 0}
.pwdBox .btns{display:flex;gap:10px;justify-content:flex-end}
.pwdBox button{padding:8px 16px;border-radius:8px;border:none;cursor:pointer}
.pwdBox .ok{background:#1d4ed8;color:#fff}
</style>
</head>

<body>

<!-- 整站密码 -->
<div class="mask" id="loginMask">
  <div class="login">
    <h3>请输入访问密码</h3>
    <input type="password" id="mainPwd" placeholder="输入密码">
    <button onclick="checkMain()">登录</button>
  </div>
</div>

<!-- 成本密码 -->
<div class="pwdModal" id="costModal">
  <div class="pwdBox">
    <h4>请输入成本密码</h4>
    <input type="password" id="costPwd">
    <div class="btns">
      <button onclick="closeCost()">取消</button>
      <button class="ok" onclick="checkCost()">确认</button>
    </div>
  </div>
</div>

<div class="header">📈 贵金属价格智能监控</div>

<div class="toolbar">
  <input type="datetime-local" id="t1">
  <input type="datetime-local" id="t2">
  <button onclick="filter()">筛选</button>
  <button onclick="reset()">重置</button>
</div>

<div class="tabbar">
  <div class="tab active" onclick="go(0)">上海有色网</div>
  <div class="tab" onclick="go(1)">庄信万丰</div>
  <div class="tab" onclick="go(2)">单线成本</div>
  <div class="tab" onclick="go(3)">四线成本</div>
</div>

<div class="page active" id="p0">
  <div class="kpi">
    <div class="item"><div class="label">黄金</div><div id="g">—</div></div>
    <div class="item"><div class="label">铂金</div><div id="b">—</div></div>
    <div class="item"><div class="label">铑金</div><div id="l">—</div></div>
  </div>
  <div class="card"><div class="chart-box"><canvas id="c0"></canvas></div></div>
  <div class="card"><div class="chart-box"><canvas id="c1"></canvas></div></div>
  <div class="card"><div class="chart-box"><canvas id="c2"></canvas></div></div>
  <div class="card"><div class="table-box"><table id="tb0"></table></div></div>
</div>

<div class="page" id="p1">
  <div class="card"><div class="chart-box"><canvas id="c3"></canvas></div></div>
  <div class="card"><div class="chart-box"><canvas id="c4"></canvas></div></div>
  <div class="card"><div class="table-box"><table id="tb1"></table></div></div>
</div>

<div class="page" id="p2">
  <div class="card"><div class="chart-box"><canvas id="c5"></canvas></div></div>
  <div class="card"><div class="table-box"><table id="tb2"></table></div></div>
</div>

<div class="page" id="p3">
  <div class="card"><div class="chart-box"><canvas id="c6"></canvas></div></div>
  <div class="card"><div class="table-box"><table id="tb3"></table></div></div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/Chart.js/4.4.8/chart.umd.min.js"></script>
<script src="data.js"></script>
<script>
const MAIN_PWD = "jinshu2026";
const COST_PWD = "xygdnbnbnb";
let mainOk = false;
let costOk = false;
let gotoPage = 0;

let data = myData || [];
let show = [...data];

window.onload = function(){
  setTimeout(()=>{ render() }, 300);
}

function checkMain(){
  let v = document.getElementById("mainPwd").value.trim();
  if(v === MAIN_PWD){
    mainOk = true;
    document.getElementById("loginMask").style.display = "none";
    render();
  } else {
    alert("密码错误");
  }
}

function go(i){
  if(!mainOk) return;
  if((i==2||i==3) && !costOk){
    gotoPage = i;
    document.getElementById("costModal").style.display = "flex";
    return;
  }
  document.querySelectorAll(".page").forEach((x,j)=>x.classList.toggle("active",j==i));
  document.querySelectorAll(".tab").forEach((x,j)=>x.classList.toggle("active",j==i));
}

function closeCost(){
  document.getElementById("costModal").style.display = "none";
}

function checkCost(){
  let v = document.getElementById("costPwd").value.trim();
  if(v === COST_PWD){
    costOk = true;
    closeCost();
    go(gotoPage);
  } else {
    alert("密码错误");
  }
}

function render(){
  if(!mainOk) return;
  updateKPI();
  table("tb0", ["时间","金99(元/克)","铂(元/克)","铑(元/克)"]);
  table("tb1", ["时间","铂含税(元/克)","铑含税(元/克)","铂美元/盎司","铑美元/盎司","汇率"]);
  table("tb2", ["时间","单线铂(万元)","单线铑(万元)","单线金(万元)","单线总计(万元)"]);
  table("tb3", ["时间","四线铂损耗(万元)","四线铑损耗(万元)","四线总损耗(万元)","四线加工费(万元)","四线总计(万元)"]);
  chart("c0","黄金","金99(元/克)");
  chart("c1","铂金","铂(元/克)");
  chart("c2","铑金","铑(元/克)");
  chart("c3","铂含税","铂含税(元/克)");
  chart("c4","铑含税","铑含税(元/克)");
  chart("c5","单线总计","单线总计(万元)");
  chart("c6","四线总计","四线总计(万元)");
}

function updateKPI(){
  if(!data.length) return;
  let d = data.at(-1);
  document.getElementById("g").innerText = d["金99(元/克)"]??"—";
  document.getElementById("b").innerText = d["铂(元/克)"]??"—";
  document.getElementById("l").innerText = d["铑(元/克)"]??"—";
}

function table(id, cols){
  let t = document.getElementById(id);
  let h = "<tr>"+cols.map(c=>`<th>${c}</th>`).join("")+"</tr>";
  show.forEach(r=>{
    h+="<tr>";
    cols.forEach(c=>h+=`<td>${r[c]??""}</td>`);
    h+="</tr>";
  });
  t.innerHTML = h;
}

function chart(id, label, key){
  let ctx = document.getElementById(id).getContext("2d");
  new Chart(ctx, {
    type:"line",
    data:{
      labels: show.map(x=>x.时间),
      datasets:[{label, data:show.map(x=>x[key]), borderColor:"#1d4ed8", tension:0.3, fill:false}]
    },
    options:{responsive:true, maintainAspectRatio:false}
  });
}

function filter(){
  let a = new Date(document.getElementById("t1").value);
  let b = new Date(document.getElementById("t2").value);
  show = data.filter(d=>{
    let t = new Date(d.时间);
    return (!a.getTime() || t>=a) && (!b.getTime() || t<=b);
  });
  render();
}

function reset(){
  document.getElementById("t1").value="";
  document.getElementById("t2").value="";
  show = [...data];
  render();
}
</script>
</body>
</html>
